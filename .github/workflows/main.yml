name: Banking Finance CI/CD

on:
  push:

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      # Checkout Source Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Build Maven Project
      - name: Build Project
        run: mvn clean install

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t banking-finance-app .

      # Login to DockerHub
      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Tag Docker Image
      - name: Tag Docker Image
        run: docker tag banking-finance-app madhvika/banking-finance:latest

      # Push Docker Image
      - name: Push Docker Image
        run: docker push madhvika/banking-finance:latest

      # Deploy into AWS EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            docker stop banking-finance-container || true

            docker rm banking-finance-container || true

            docker pull madhvika/banking-finance:latest

            docker run -d \
              --name banking-finance-container \
              -p 8080:8080 \
              madhvika/banking-finance:latest


